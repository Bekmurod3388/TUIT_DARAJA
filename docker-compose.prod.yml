services:
    db:
        image: mysql:8.4
        restart: unless-stopped
        env_file:
            - .env.production
        command: >
            --character-set-server=utf8mb4
            --collation-server=utf8mb4_unicode_ci
        volumes:
            - dbdata:/var/lib/mysql
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
            interval: 5s
            timeout: 3s
            retries: 20

    php:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
            target: production
        restart: unless-stopped
        env_file:
            - .env.production
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - app_storage:/var/www/TUIT_DARAJA/storage
        healthcheck:
            test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3

    nginx:
        build:
            context: .
            dockerfile: ./docker/nginx/Dockerfile
        restart: unless-stopped
        depends_on:
            php:
                condition: service_healthy
        ports:
            - "${APP_PORT:-80}:80"
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/login || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3

volumes:
    dbdata:
    app_storage:
