services:
    db:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: tuit
            MYSQL_USER: tuit
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: rootsecret
        command: >
            --character-set-server=utf8mb4
            --collation-server=utf8mb4_unicode_ci
        volumes:
            - dbdata:/var/lib/mysql
        # Host port mapping shart emas; xohlasa qo'yasiz:
        # ports:
        #   - "33060:3306"
        healthcheck:
            # MySQL tayyormi? (root parol bilan ping)
            test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
            interval: 5s
            timeout: 3s
            retries: 20

    php:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
        volumes:
            - .:/var/www/TUIT_DARAJA
        environment:
            APP_ENV: local
            APP_DEBUG: "true"
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: tuit
            DB_USERNAME: tuit
            DB_PASSWORD: secret
        depends_on:
            db:
                condition: service_healthy     # ← DB sog‘lom bo‘lmaguncha PHP start olmaydi
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "php", "-v"]
            interval: 30s
            timeout: 5s
            retries: 3

    nginx:
        image: nginx:1.27-alpine
        depends_on:
            - php
        ports:
            - "8081:80"
        volumes:
            - .:/var/www/TUIT_DARAJA:ro
            - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
    dbdata:
